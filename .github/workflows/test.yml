name: Build and Package Test

on:
  workflow_dispatch:

jobs:
  build-updater:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: windows-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Логи структуры репо сразу после checkout
      - name: List repo root
        shell: pwsh
        run: |
          Write-Host "=== Repo root ==="
          Get-ChildItem -Recurse -Depth 2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      # Логи по папке binary и имени инсталлера
      - name: Inspect binary folder
        shell: pwsh
        run: |
          Write-Host "=== binary folder contents ==="
          if (Test-Path "binary") {
            Get-ChildItem -Path "binary"
          } else {
            Write-Host "binary folder DOES NOT EXIST"
          }

      - name: Update wails.json outputfilename from installer in repo
        id: parse_version
        shell: pwsh
        run: |
          Write-Host "=== Searching installer in binary ==="
          $installer = Get-ChildItem -Path "binary" -Filter "Void.Presence.Setup.*.exe" |
            Select-Object -First 1

          if (-not $installer) {
            throw "Не найден Void.Presence.Setup.*.exe в binary (from repo)"
          }

          Write-Host "Found installer:"
          Write-Host "  FullName: $($installer.FullName)"
          Write-Host "  Name    : $($installer.Name)"

          $name  = $installer.Name
          $base  = [System.IO.Path]::GetFileNameWithoutExtension($name)
          $parts = $base.Split('.')

          Write-Host "  Base    : $base"
          Write-Host "  Parts   : $($parts -join ', ')"

          $version = ($parts[3..($parts.Length-1)] -join '.')
          Write-Host "Parsed version from installer name: $version"

          $wailsPath = "wails.json"
          Write-Host "Updating $wailsPath outputfilename -> Void.Presence.Updates.$version"

          $config = Get-Content $wailsPath -Raw | ConvertFrom-Json
          $config.outputfilename = "Void.Presence.Updates.$version"

          $config | ConvertTo-Json -Depth 10 | Out-File $wailsPath -Encoding UTF8

          Write-Host "wails.json updated"
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Wails app (Windows)
        shell: pwsh
        run: |
          Write-Host "=== Building Wails app for Windows ==="
          wails build -clean -platform windows/amd64
          Write-Host "=== Contents of build\bin after build ==="
          if (Test-Path "build\bin") {
            Get-ChildItem -Path "build\bin"
          } else {
            Write-Host "build\bin DOES NOT EXIST"
          }

      - name: Read outputfilename from wails.json
        id: wails_name
        shell: pwsh
        run: |
          $wailsPath = "wails.json"
          $config = Get-Content $wailsPath -Raw | ConvertFrom-Json
          $outfile = $config.outputfilename
          if (-not $outfile) {
            throw "outputfilename пустой в wails.json"
          }
          $fullPath = "build\bin\$outfile.exe"
          Write-Host "Will upload: $fullPath"
          if (-not (Test-Path $fullPath)) {
            Write-Host "ERROR: File not found: $fullPath"
            Get-ChildItem -Path "build\bin"
            throw "Updater exe not found"
          }
          "file=$fullPath" >> $env:GITHUB_OUTPUT

      - name: Get latest tag of this repo
        id: latest_tag
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $owner = 'Devollox'
          $repo  = 'void-updates'

          $headers = @{
            'Accept'        = 'application/vnd.github+json'
            'Authorization' = "Bearer $env:GITHUB_TOKEN"
          }

          Write-Host "Requesting latest release for $owner/$repo"
          $release = Invoke-RestMethod `
            -Uri "https://api.github.com/repos/$owner/$repo/releases/latest" `
            -Headers $headers

          $tag = $release.tag_name
          if (-not $tag) {
            throw "Не удалось получить latest tag для $owner/$repo"
          }

          Write-Host "Latest release tag: $tag"
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Upload updater to latest release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.wails_name.outputs.file }}
          tag_name: ${{ steps.latest_tag.outputs.tag }}
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
