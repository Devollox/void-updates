name: Build and Package Updater

on:
  workflow_run:
    workflows: ['Download and Commit Installer']
    types:
      - completed
  workflow_dispatch:

jobs:
  build-updater:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: windows-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Update wails.json outputfilename from installer in repo
        id: parse_version
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "build/bin" -Filter "Void.Presence.Setup.*.exe" |
            Select-Object -First 1

          if (-not $installer) {
            throw "Не найден Void.Presence.Setup.*.exe в build/bin (from repo)"
          }

          $name  = $installer.Name
          $base  = [System.IO.Path]::GetFileNameWithoutExtension($name)
          $parts = $base.Split('.')

          $version = ($parts[3..($parts.Length-1)] -join '.')
          $wailsPath = "wails.json"

          $config = Get-Content $wailsPath -Raw | ConvertFrom-Json
          $config.outputfilename = "Void.Presence.Updates.$version"

          $config | ConvertTo-Json -Depth 10 | Out-File $wailsPath -Encoding UTF8

          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Wails app (Windows)
        run: |
          wails build -clean -platform windows/amd64
          dir build\bin

      - name: Get latest tag of this repo
        id: latest_tag
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $owner = 'Devollox'
          $repo  = 'void-updates'

          $headers = @{
            'Accept'        = 'application/vnd.github+json'
            'Authorization' = "Bearer $env:GITHUB_TOKEN"
          }

          $release = Invoke-RestMethod `
            -Uri "https://api.github.com/repos/$owner/$repo/releases/latest" `
            -Headers $headers

          $tag = $release.tag_name
          if (-not $tag) {
            throw "Не удалось получить latest tag для $owner/$repo"
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Upload updater to latest release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build\bin\Void.Presence.Updates.*.exe
          tag_name: ${{ steps.latest_tag.outputs.tag }}
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
