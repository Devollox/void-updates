name: Build and Package Updater

on:
  workflow_run:
    workflows: ['Download and Commit Installer']
    types:
      - completed

jobs:
  build-updater:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: windows-latest

    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clear all Actions caches (test)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Listing caches before delete:"
          gh cache list --repo "Devollox/void-updates" || true
          echo "Deleting all caches..."
          gh cache delete --repo "Devollox/void-updates" --all || true
          echo "Caches after delete (may be empty):"
          gh cache list --repo "Devollox/void-updates" || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Update wails.json outputfilename from installer in repo
        id: parse_version
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path "binary" -Filter "Void.Presence.Setup.*.exe" |
            Select-Object -First 1

          if (-not $installer) {
            throw "Не найден Void.Presence.Setup.*.exe в binary (from repo)"
          }

          $name  = $installer.Name
          $base  = [System.IO.Path]::GetFileNameWithoutExtension($name)
          $parts = $base.Split('.')

          Write-Host "Found installer in binary (from repo):"
          Write-Host "  file name: $name"
          Write-Host "  base     : $base"
          Write-Host "  parts    : $($parts -join ', ')"

          $version = ($parts[3..($parts.Length-1)] -join '.')
          Write-Host "Parsed version from installer name: $version"

          $wailsPath = "wails.json"
          Write-Host "Updating $wailsPath outputfilename -> Void.Presence.Updates.$version"

          $config = Get-Content $wailsPath -Raw | ConvertFrom-Json
          $config.outputfilename = "Void.Presence.Updates.$version"

          $config | ConvertTo-Json -Depth 10 | Out-File $wailsPath -Encoding UTF8

          Write-Host "wails.json updated"

          # отдадим версию в outputs
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Wails app (Windows)
        run: |
          echo "Building Wails app for Windows"
          wails build -clean -platform windows/amd64
          echo "Build finished. Contents of binary:"
          dir build\bin

      - name: Get latest tag of this repo
        id: latest_tag
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $owner = 'Devollox'
          $repo  = 'void-updates'

          $headers = @{
            'Accept'        = 'application/vnd.github+json'
            'Authorization' = "Bearer $env:GITHUB_TOKEN"
          }

          Write-Host "Requesting latest release for $owner/$repo"
          $release = Invoke-RestMethod `
            -Uri "https://api.github.com/repos/$owner/$repo/releases/latest" `
            -Headers $headers

          $tag = $release.tag_name
          if (-not $tag) {
            throw "Не удалось получить latest tag для $owner/$repo"
          }

          Write-Host "Latest release of void-updates:"
          Write-Host "  tag_name: $tag"
          Write-Host "  name    : $($release.name)"

          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Upload updater to latest release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build\bin\Void.Presence.Updates.*.exe
          tag_name: ${{ steps.latest_tag.outputs.tag }}
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
