name: Download and Commit Installer

on:
  repository_dispatch:
    types: [main_repo_updated]

jobs:
  download-and-commit:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare build/bin
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "build/bin" | Out-Null
          Get-ChildItem -Path "build/bin" -Filter "*.exe" -File | Remove-Item -Force
          Write-Host "Cleaned build/bin"

      - name: Download Void Presence installer for tag from payload
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $owner = 'Devollox'
          $repo  = 'void-presence'
          $tag   = "${{ github.event.client_payload.tag }}"

          if (-not $tag) {
            throw "client_payload.tag is empty"
          }

          $headers = @{
            'Accept'        = 'application/vnd.github+json'
            'Authorization' = "Bearer $env:GITHUB_TOKEN"
          }

          Write-Host "Requesting release for $owner/$repo tag $tag"
          $release = Invoke-RestMethod `
            -Uri "https://api.github.com/repos/$owner/$repo/releases/tags/$tag" `
            -Headers $headers

      - name: Commit installer and version
        shell: bash
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

          git add build/bin VERSION

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: update installer to latest Void Presence"
          git push
