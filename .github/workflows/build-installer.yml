name: Download and Commit Installer

on:
  repository_dispatch:
    types: [main_repo_updated]

jobs:
  download-and-commit:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare build/bin
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "build/bin" | Out-Null
          Get-ChildItem -Path "build/bin" -Filter "*.exe" -File | Remove-Item -Force
          Write-Host "Cleaned build/bin"

      - name: Download latest Void Presence installer
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $owner = 'Devollox'
          $repo  = 'void-presence'

          $headers = @{
            'Accept'        = 'application/vnd.github+json'
            'Authorization' = "Bearer $env:GITHUB_TOKEN"
          }

          Write-Host "Requesting latest release for $owner/$repo"
          $release = Invoke-RestMethod `
            -Uri "https://api.github.com/repos/$owner/$repo/releases/latest" `
            -Headers $headers

          Write-Host "Latest release:"
          Write-Host "  tag_name: $($release.tag_name)"
          Write-Host "  name    : $($release.name)"

          $asset = $release.assets |
            Where-Object { $_.name -like 'Void.Presence.Setup.*.exe' } |
            Select-Object -First 1

          if (-not $asset) {
            Write-Host "Assets in latest release:"
            $release.assets | ForEach-Object { Write-Host "  - $($_.name)" }
            throw "Void.Presence.Setup.*.exe not found in latest void-presence release"
          }

          $assetName   = $asset.name
          $downloadUrl = $asset.browser_download_url

          Write-Host "Selected asset:"
          Write-Host "  name: $assetName"
          Write-Host "  url : $downloadUrl"

          New-Item -ItemType Directory -Force -Path "build/bin" | Out-Null

          $outPath = "build/bin/$assetName"
          Write-Host "Downloading to $outPath"
          Invoke-WebRequest -Uri $downloadUrl -OutFile $outPath
          Write-Host "Download completed"

          # Save version into VERSION file
          $base    = [System.IO.Path]::GetFileNameWithoutExtension($assetName)
          $parts   = $base.Split('.')
          $version = ($parts[3..($parts.Length-1)] -join '.')
          "version=$version" | Out-File VERSION -Encoding UTF8

      - name: Commit installer and version
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

          git add build/bin VERSION

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: update installer to latest Void Presence"
          git push
